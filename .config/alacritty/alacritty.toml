[general]
live_config_reload = true

[window]
opacity = 0.9
blur = true
startup_mode = "Maximized"
title = "Terminal"
dynamic_title = false

[font]
size = 14
offset = { x = 0, y = 1 }

[font.normal]
family = "0xProto Nerd Font"
style = "Regular"

[font.bold]
family = "0xProto Nerd Font"
style = "Bold"

[font.italic]
family = "0xProto Nerd Font"
style = "Regular Italic"

[font.bold_italic]
family = "0xProto Nerd Font"
style = "Bold"

[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"
dim_foreground = "#7f849c"
bright_foreground = "#cdd6f4"

[colors.cursor]
text = "#1e1e2e"
cursor = "#f5e0dc"

[colors.vi_mode_cursor]
text = "#1e1e2e"
cursor = "#b4befe"

[colors.search.matches]
foreground = "#1e1e2e"
background = "#a6adc8"

[colors.search.focused_match]
foreground = "#1e1e2e"
background = "#a6e3a1"

[colors.footer_bar]
foreground = "#1e1e2e"
background = "#a6adc8"

[colors.hints.start]
foreground = "#1e1e2e"
background = "#f9e2af"

[colors.hints.end]
foreground = "#1e1e2e"
background = "#a6adc8"

[colors.selection]
text = "#1e1e2e"
background = "#f5e0dc"

[colors.normal]
black = "#45475a"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#bac2de"

[colors.bright]
black = "#585b70"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#a6adc8"

[[colors.indexed_colors]]
index = 16
color = "#fab387"

[[colors.indexed_colors]]
index = 17
color = "#f5e0dc"

[bell]
duration = 150
animation = "EaseOut"
color = "#a6b3cc"

[cursor]
unfocused_hollow = false
thickness = 0.2
blink_interval = 750
blink_timeout = 5

[cursor.style]
shape = "Beam"
blinking = "Always"

[[hints.enabled]]
regex = "(https?://)[^\\s'\"]+"
command = { program = "xdg-open", args = [] }
mouse = { enabled = true }
post_processing = true
persist = false

[terminal]
shell = "/bin/zsh"
