"$schema" = "https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json"
version = 2
final_space = true

[[blocks]]
type = "prompt"
alignment = "left"

	[[blocks.segments]] 
        type = "text"
        style = "plain"
        foreground_templates = [ "{{if eq .Code 0}}blue{{else}}red{{end}}" ]
        template = " "


